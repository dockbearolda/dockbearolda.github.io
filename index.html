<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#000000" />
<title>OLDA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #000; color: #f5f5f7; overflow-x: hidden; }
  body::before, body::after { content: ''; position: fixed; width: 70vmax; height: 70vmax; border-radius: 50%; filter: blur(140px); opacity: 0.30; pointer-events: none; z-index: 0; animation: float 22s ease-in-out infinite; }
  body::before { background: radial-gradient(circle, #0a84ff 0%, transparent 60%); top: -25vmax; left: -15vmax; }
  body::after { background: radial-gradient(circle, #bf5af2 0%, transparent 60%); bottom: -25vmax; right: -15vmax; animation-delay: -11s; }
  @keyframes float { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(6vmax,-6vmax) scale(1.15);} }
  .wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; }
  header { text-align: center; margin-bottom: 64px; }
  .logo { font-size: clamp(56px, 10vw, 96px); font-weight: 800; letter-spacing: -0.05em; line-height: 1; background: linear-gradient(135deg, #ffffff 0%, #ffffff 30%, #8e8e93 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 14px; }
  .subtitle { font-size: clamp(15px, 2vw, 18px); color: #a1a1a6; font-weight: 400; }
  .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; width: 100%; max-width: 1000px; }
  .tile { flex: 0 0 calc((100% - 48px) / 3); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; aspect-ratio: 1/1; background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.10); border-radius: 28px; text-decoration: none; color: #f5f5f7; backdrop-filter: blur(20px); transition: transform .35s cubic-bezier(0.22,1,0.36,1), border-color .25s, background .25s; overflow: hidden; opacity: 0; transform: translateY(30px); animation: appear .7s cubic-bezier(0.22,1,0.36,1) forwards; }
  @media (max-width: 720px) { .tile { flex-basis: calc((100% - 16px) / 2); } .grid { gap: 16px; } }
  .tile:nth-child(1){animation-delay:.05s} .tile:nth-child(2){animation-delay:.12s} .tile:nth-child(3){animation-delay:.19s} .tile:nth-child(4){animation-delay:.26s} .tile:nth-child(5){animation-delay:.33s} .tile:nth-child(6){animation-delay:.40s} .tile:nth-child(7){animation-delay:.47s} .tile:nth-child(8){animation-delay:.54s}
  @keyframes appear { to { opacity: 1; transform: translateY(0); } }
  .tile:hover { transform: translateY(-6px) scale(1.02); border-color: rgba(255,255,255,0.25); background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)); }
  .tile:active { transform: translateY(-2px) scale(0.99); }
  .tile-icon { width: 72px; height: 72px; border-radius: 22px; display: flex; align-items: center; justify-content: center; transition: transform .35s cubic-bezier(0.22,1,0.36,1); }
  .tile:hover .tile-icon { transform: scale(1.1) rotate(-3deg); }
  .tile-icon svg { width: 38px; height: 38px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .ic-blue { background: linear-gradient(135deg, #0a84ff, #0040dd); box-shadow: 0 10px 30px rgba(10,132,255,0.4); }
  .ic-purple { background: linear-gradient(135deg, #bf5af2, #7d28b8); box-shadow: 0 10px 30px rgba(191,90,242,0.4); }
  .ic-pink { background: linear-gradient(135deg, #ff375f, #c2185b); box-shadow: 0 10px 30px rgba(255,55,95,0.4); }
  .ic-orange { background: linear-gradient(135deg, #ff9f0a, #d77400); box-shadow: 0 10px 30px rgba(255,159,10,0.4); }
  .ic-green { background: linear-gradient(135deg, #30d158, #1a8c3a); box-shadow: 0 10px 30px rgba(48,209,88,0.4); }
  .ic-teal { background: linear-gradient(135deg, #64d2ff, #0a84ff); box-shadow: 0 10px 30px rgba(100,210,255,0.4); }
  .ic-fiverr { background: linear-gradient(135deg, #1dbf73, #0e8a52); box-shadow: 0 10px 30px rgba(29,191,115,0.4); }
  .ic-indigo { background: linear-gradient(135deg, #5e5ce6, #3634a3); box-shadow: 0 10px 30px rgba(94,92,230,0.4); }
  .tile-name { font-size: clamp(15px, 1.8vw, 18px); font-weight: 600; letter-spacing: -0.01em; text-align: center; padding: 0 8px; }
  .tile-sub { font-size: 12px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.12em; margin-top: -6px; }
  footer { margin-top: 60px; color: #6e6e73; font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">OLDA</div>
    <div class="subtitle">Choisissez une plateforme</div>
  </header>
  <div class="grid">
    <a href="https://web-production-a63b27.up.railway.app/" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-teal"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div class="tile-sub">Planning</div><div class="tile-name">Planning OLDA</div>
    </a>
    <a href="https://myolda.up.railway.app/" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-blue"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div class="tile-sub">B2C</div><div class="tile-name">myOLDA</div>
    </a>
    <a href="https://atelierolda.up.railway.app" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-purple"><svg viewBox="0 0 24 24"><path d="M2 22h20"/><path d="M6 18V8l6-4 6 4v10"/><path d="M10 22V12h4v10"/></svg></div>
      <div class="tile-sub">B2B</div><div class="tile-name">Atelier</div>
    </a>
    <a href="https://dtfolda.up.railway.app" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-pink"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8 22 9 17 14 18 21 12 18 6 21 7 14 2 9 9 8 12 2"/></svg></div>
      <div class="tile-sub">Demande</div><div class="tile-name">DTF</div>
    </a>
    <a href="https://oldaflash.up.railway.app" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-orange"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <div class="tile-sub">Tablette</div><div class="tile-name">Devis Flash</div>
    </a>
    <a href="https://batolda-production.up.railway.app" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-green"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <div class="tile-sub">Validation</div><div class="tile-name">BAT Flash</div>
    </a>
    <a href="https://suivi-logos-production.up.railway.app/" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-indigo"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/></svg></div>
      <div class="tile-sub">Suivi</div><div class="tile-name">Suivi Logos</div>
    </a>
    <a href="https://fr.fiverr.com/" target="_blank" rel="noopener" class="tile">
      <div class="tile-icon ic-fiverr"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div>
      <div class="tile-sub">Freelance</div><div class="tile-name">Fiverr</div>
    </a>
  </div>
  <footer>© <span id="y"></span> OLDA</footer>
</div>
<script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
