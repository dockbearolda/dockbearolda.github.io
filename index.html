<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#ffffff" />
<title>OLDA</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  :root{
    --duck:#4A6274; --duck-hover:#42596A; --duck-focus:#6B8191;
    --sage:#8BA0AF; --sage-2:#ADB8B9;
    --ink:#202930; --muted:#5b6b78; --muted-2:#7a8893;
    --card-border:rgba(74,98,116,0.12);
    --tint:rgba(74,98,116,0.07);
    --shadow:0 1px 2px rgba(32,41,48,.05),0 8px 20px rgba(74,98,116,.08),0 18px 44px rgba(74,98,116,.10);
    --shadow-hover:0 2px 6px rgba(32,41,48,.07),0 16px 34px rgba(74,98,116,.16),0 30px 64px rgba(74,98,116,.20);
    --radius:18px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1100px 560px at 50% -12%, rgba(74,98,116,.07), transparent 62%),
      radial-gradient(900px 500px at 110% 115%, rgba(139,160,175,.08), transparent 60%),
      #ffffff;
    color:var(--ink);
    font-variant-numeric:tabular-nums; overflow-x:hidden;
  }
  .wrap{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 24px; }
  .grid{ display:flex; flex-wrap:nowrap; justify-content:center; align-items:stretch; gap:18px; width:100%; max-width:1180px; }
  .tile{
    flex:1 1 0; min-width:0;
    position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px;
    padding:24px 12px;
    background:linear-gradient(180deg,#ffffff 0%,#fbfcfd 100%);
    border:1px solid var(--card-border); border-radius:var(--radius);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.9);
    text-decoration:none; color:var(--ink); overflow:hidden; isolation:isolate;
    transition:transform .4s cubic-bezier(.22,1,.36,1), box-shadow .3s, border-color .3s;
    opacity:0; transform:translateY(24px); animation:appear .6s cubic-bezier(.22,1,.36,1) forwards;
  }
  /* reflet diagonal qui balaye la tuile au survol */
  .tile::after{
    content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
    background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,.55) 48%, transparent 66%);
    transform:translateX(-130%); transition:transform .7s cubic-bezier(.22,1,.36,1);
  }
  .tile:hover::after{ transform:translateX(130%); }
  /* Tablette paysage : on resserre un peu */
  @media (max-width:1100px){ .grid{ gap:12px; } .tile{ padding:18px 8px; gap:10px; } }
  /* Tablette portrait : tuiles plus compactes, toujours sur une ligne */
  @media (max-width:820px){ .grid{ gap:9px; } .tile{ padding:14px 6px; gap:8px; border-radius:13px; } .tile-icon{ width:46px; height:46px; border-radius:12px; } .tile-icon svg{ width:24px; height:24px; } }
  /* Petit écran : la ligne reste intacte mais défile horizontalement */
  @media (max-width:620px){
    .grid{ flex-wrap:nowrap; justify-content:flex-start; overflow-x:auto; gap:10px; padding:4px 4px 14px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .grid::-webkit-scrollbar{ display:none; }
    .tile{ flex:0 0 116px; padding:16px 10px; }
  }
  .tile:nth-child(1){animation-delay:.04s} .tile:nth-child(2){animation-delay:.10s} .tile:nth-child(3){animation-delay:.16s} .tile:nth-child(4){animation-delay:.22s} .tile:nth-child(5){animation-delay:.28s} .tile:nth-child(6){animation-delay:.34s} .tile:nth-child(7){animation-delay:.40s} .tile:nth-child(8){animation-delay:.46s} .tile:nth-child(9){animation-delay:.52s} .tile:nth-child(10){animation-delay:.58s} .tile:nth-child(11){animation-delay:.64s}
  @keyframes appear{ to{ opacity:1; transform:translateY(0); } }
  .tile:hover{ transform:translateY(-6px); box-shadow:var(--shadow-hover), inset 0 1px 0 rgba(255,255,255,.9); border-color:rgba(74,98,116,0.24); }
  .tile:active{ transform:translateY(-2px) scale(.97); }
  .tile:focus-visible{ outline:none; border-color:var(--duck-focus); box-shadow:0 0 0 3px rgba(107,129,145,.20),var(--shadow); }
  .tile-icon{
    position:relative; z-index:1;
    width:62px; height:62px; border-radius:16px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg, rgba(74,98,116,.10), rgba(74,98,116,.05));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7), inset 0 0 0 1px rgba(74,98,116,.06);
    transition:transform .4s cubic-bezier(.22,1,.36,1), background .3s, box-shadow .3s;
  }
  .tile:hover .tile-icon{
    transform:scale(1.08) translateY(-1px);
    background:linear-gradient(150deg,#56707f 0%,#42596A 100%);
    box-shadow:0 12px 26px rgba(74,98,116,.34), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .tile-icon svg{ width:31px; height:31px; stroke:var(--duck); fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; transition:stroke .3s; }
  .tile:hover .tile-icon svg{ stroke:#fff; }
  .tile-text{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  @media (max-width:440px){ .tile-text{ align-items:flex-start; } }
  .tile-name{ font-size:clamp(14px,1.6vw,16px); font-weight:600; letter-spacing:-.005em; text-align:center; color:var(--duck); transition:color .3s; }
  .tile:hover .tile-name{ color:var(--duck-hover); }
  /* Tuile discrète, verrouillée — icône noir, sans nom */
  .tile--secret{ -webkit-appearance:none; appearance:none; font:inherit; cursor:pointer; color:inherit; }
  .tile--secret .tile-icon{
    background:linear-gradient(160deg,#1a1d21,#000);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 0 0 1px rgba(0,0,0,.45);
  }
  .tile--secret .tile-icon svg{ stroke:#f1f2f3; }
  .tile--secret:hover .tile-icon{
    transform:scale(1.08) translateY(-1px);
    background:linear-gradient(150deg,#2c2f33 0%,#000 100%);
    box-shadow:0 12px 26px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.14);
  }
  .tile--secret:hover .tile-icon svg{ stroke:#fff; }

  /* Modale d'accès par mot de passe */
  .lock-overlay{
    position:fixed; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    padding:24px; padding-bottom:calc(24px + env(safe-area-inset-bottom));
    background:rgba(32,41,48,.34);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    animation:overlayIn .25s ease forwards;
  }
  .lock-overlay[hidden]{ display:none; }
  @keyframes overlayIn{ from{opacity:0} to{opacity:1} }
  .lock-card{
    width:100%; max-width:340px;
    background:linear-gradient(180deg,#ffffff 0%,#fbfcfd 100%);
    border:1px solid var(--card-border); border-radius:var(--radius);
    box-shadow:var(--shadow-hover); padding:26px 22px 22px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
    transform:translateY(8px) scale(.98); opacity:0;
    animation:cardIn .35s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes cardIn{ to{ transform:translateY(0) scale(1); opacity:1; } }
  .lock-badge{
    width:54px; height:54px; border-radius:15px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#1a1d21,#000);
    box-shadow:0 10px 22px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.1);
  }
  .lock-badge svg{ width:26px; height:26px; stroke:#fff; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; }
  #lockForm{ width:100%; display:flex; flex-direction:column; gap:12px; }
  #lockInput{
    width:100%; height:48px; padding:0 14px;
    font-size:16px; color:var(--ink); font-family:inherit;
    background:#fff; border:1px solid var(--card-border); border-radius:12px;
    outline:none; transition:border-color .2s, box-shadow .2s;
  }
  #lockInput:focus{ border-color:var(--duck-focus); box-shadow:0 0 0 3px rgba(107,129,145,.18); }
  #lockInput.shake{ animation:shake .4s; border-color:#c0392b; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .lock-actions{ display:flex; gap:10px; }
  .lock-btn{
    flex:1; min-height:46px; border-radius:12px; font-size:15px; font-weight:600; font-family:inherit;
    cursor:pointer; border:1px solid transparent;
    -webkit-appearance:none; appearance:none; transition:transform .15s, background .2s, border-color .2s;
  }
  .lock-btn:active{ transform:scale(.97); }
  .lock-btn--ghost{ background:#fff; color:var(--muted); border-color:var(--card-border); }
  .lock-btn--go{ background:linear-gradient(150deg,#1a1d21,#000); color:#fff; }
  .lock-error{ font-size:13px; color:#c0392b; text-align:center; margin-top:2px; }
  .lock-error[hidden]{ display:none; }
  footer{ margin-top:56px; color:var(--muted-2); font-size:12px; text-align:center; }
</style>

<script>
  document.getElementById('y').textContent = new Date().getFullYear();

  (function(){
    // Accès protégé : l'URL de destination de chaque tuile est chiffrée (AES-GCM,
    // clé dérivée du mot de passe par PBKDF2) dans l'attribut data-enc.
    // Ni le mot de passe ni les URLs n'apparaissent en clair dans la source.
    // Seul le bon mot de passe déchiffre l'URL de la tuile cliquée et l'ouvre.
    var ITER    = 150000;
    var overlay = document.getElementById('lockOverlay');
    var input   = document.getElementById('lockInput');
    var errorEl = document.getElementById('lockError');
    var form    = document.getElementById('lockForm');
    var cancel  = document.getElementById('lockCancel');
    var tiles   = document.querySelectorAll('.tile--secret');
    var encStr  = null;

    function openLock(enc){
      encStr = enc;
      errorEl.hidden = true;
      input.value = '';
      input.classList.remove('shake');
      overlay.hidden = false;
      setTimeout(function(){ input.focus(); }, 60);
    }
    function closeLock(){ overlay.hidden = true; encStr = null; }

    function b64(s){ return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); }); }
    async function decryptUrl(enc, pw){
      var parts = enc.split('.');           // salt.iv.ciphertext (base64)
      var base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      var key  = await crypto.subtle.deriveKey(
        {name:'PBKDF2', salt:b64(parts[0]), iterations:ITER, hash:'SHA-256'},
        base, {name:'AES-GCM', length:256}, false, ['decrypt']);
      var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(parts[1])}, key, b64(parts[2]));
      return new TextDecoder().decode(pt);
    }

    Array.prototype.forEach.call(tiles, function(t){
      t.addEventListener('click', function(){ openLock(t.getAttribute('data-enc')); });
    });
    cancel.addEventListener('click', closeLock);
    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeLock(); });
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && !overlay.hidden) closeLock(); });

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      var dest = null;
      if(encStr){ try { dest = await decryptUrl(encStr, input.value); } catch(_){ dest = null; } }
      if(dest){
        closeLock();
        window.location.href = dest;
      } else {
        errorEl.hidden = false;
        input.classList.remove('shake'); void input.offsetWidth; input.classList.add('shake');
        input.select();
      }
    });
  })();
</script>
