<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>OLDA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 48px 24px;
    width: 100%;
    max-width: 360px;
  }
  .logo svg {
    width: 72px;
    height: 72px;
    display: block;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    outline: none;
    transition: border-color .2s;
    color: #111;
    background: #fff;
  }
  input[type="password"]:focus { border-color: #111; }
  button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .01em;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  button:hover { background: #222; }
  button:active { transform: scale(.98); }
  .error {
    font-size: 13px;
    color: #c0392b;
    text-align: center;
    min-height: 18px;
    transition: opacity .2s;
  }
  .error.hidden { opacity: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <!-- Logomark OLDA — cercle brisé + barre horizontale, tout en noir -->
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="36" r="26" stroke="#111" stroke-width="5.5" stroke-linecap="round"
        stroke-dasharray="1 0"
        stroke-dashoffset="0"/>
      <line x1="20" y1="36" x2="52" y2="36" stroke="#111" stroke-width="5.5" stroke-linecap="round"/>
    </svg>
  </div>
  <form id="f" onsubmit="check(event)">
    <input type="password" id="pw" placeholder="Mot de passe" autocomplete="current-password" autofocus />
    <button type="submit">Accéder</button>
    <p class="error hidden" id="err">Mot de passe incorrect</p>
  </form>
</div>
<script>
  function check(e) {
    e.preventDefault();
    const err = document.getElementById('err');
    if (document.getElementById('pw').value === 'Clafouti18$') {
      window.location.href = 'https://design-olda-production.up.railway.app/';
    } else {
      err.classList.remove('hidden');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
  document.getElementById('pw').addEventListener('input', function() {
    document.getElementById('err').classList.add('hidden');
  });
</script>
</body>
</html>
